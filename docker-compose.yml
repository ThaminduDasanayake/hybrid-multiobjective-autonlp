services:
  backend:
    build: .
    container_name: autonlp-backend
    ports:
      - "8000:7860"
    environment:
      - CORS_ORIGINS=http://localhost:5173,https://t-autonlp.vercel.app
    volumes:
      # Persist ML experiment data across container restarts.
      - ./backend/jobs:/app/jobs
      - ./backend/logs:/app/logs
      - ./backend/results:/app/results
      # Cache downloaded datasets so they aren't re-fetched on restart.
      - ./backend/data:/app/data
    restart: unless-stopped
